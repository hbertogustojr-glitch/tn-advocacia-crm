services:
  mysql:
    image: mysql:8.4
    container_name: legal_assistant_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: legal_assistant
      MYSQL_USER: legal_user
      MYSQL_PASSWORD: legal_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:

