services:
  evolution-postgres:
    image: postgres:16-alpine
    container_name: evolution_postgres
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_password
    ports:
      - "5433:5432"
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution_redis
    ports:
      - "6380:6379"
    volumes:
      - evolution_redis_data:/data

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    depends_on:
      - evolution-postgres
      - evolution-redis
    ports:
      - "8080:8080"
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8080
      TELEMETRY: "false"
      CORS_ORIGIN: "*"
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: "true"
      LOG_LEVEL: ERROR,WARN,INFO,LOG,WEBHOOKS
      LOG_COLOR: "true"
      LOG_BAILEYS: error
      DEL_INSTANCE: "false"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution_password@evolution-postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_local
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://host.docker.internal:8000/webhooks/evolution/whatsapp
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      CONFIG_SESSION_PHONE_CLIENT: Legal Assistant
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: 60
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-change_this_local_key}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      LANGUAGE: pt-BR

volumes:
  evolution_postgres_data:
  evolution_redis_data:
